name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - if: runner.os == 'Linux'
        run: bunx playwright install --with-deps chromium
      - if: runner.os == 'macOS'
        run: bunx playwright install chromium
      - run: bun test
      - run: bun run typecheck
      - run: bun run build
      - run: git diff --exit-code -- dist/cli.js
      - name: Smoke-test packed CLI
        shell: bash
        run: |
          package_dir="$(mktemp -d)"
          package_file="$(npm pack --pack-destination "$package_dir" --silent)"
          npm install --prefix "$package_dir/install" "$package_dir/$package_file"
          "$package_dir/install/node_modules/.bin/shimon" --version
